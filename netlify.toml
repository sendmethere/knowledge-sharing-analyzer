[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  included_files = ["src/config/prompts/**"]

[[functions]]
  path = "/api/analyze"
  timeout = 120  # seconds

[[functions]]
  path = "/api/chat"
  timeout = 60
